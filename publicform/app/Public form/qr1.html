function generateQRCodeInto(containerId, url) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  new QRCode(container, {
    text: url,
    width: 300,
    height: 300,
    correctLevel: QRCode.CorrectLevel.H
  });
}

function getDataUrlFromContainer(containerId) {
  const container = document.getElementById(containerId);
  const img = container.querySelector('img');
  if (img && img.src) return img.src;
  const canvas = container.querySelector('canvas');
  if (canvas) return canvas.toDataURL('image/png');
  return null;
}

function createFormattedQRImage(qrDataUrl, site) {
  return new Promise((resolve) => {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    canvas.width = 800;
    canvas.height = 1000;

    // White background
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const qrImg = new Image();
    qrImg.onload = function () {

      const qrSize = 450;
      ctx.drawImage(qrImg, (canvas.width - qrSize) / 2, 280, qrSize, qrSize);

      ctx.fillStyle = "#000";
      ctx.textAlign = "center";

      ctx.font = "bold 40px Arial";
      ctx.fillText(site.name, canvas.width / 2, 150);

      ctx.font = "26px Arial";
      ctx.fillText("Site ID: " + site.siteId, canvas.width / 2, 210);

      resolve(canvas.toDataURL("image/png"));
    };

    qrImg.src = qrDataUrl;
  });
}

async function downloadContainerImage(containerId, site) {
  const qrDataUrl = getDataUrlFromContainer(containerId);
  if (!qrDataUrl) return alert("QR not ready");

  const finalImage = await createFormattedQRImage(qrDataUrl, site);

  const a = document.createElement("a");
  a.href = finalImage;
  a.download = site.name.replace(/[^a-z0-9-_]/gi,'_') + ".png";
  a.click();
}

async function downloadAllAsZip() {
  const zip = new JSZip();
  let added = 0;

  for (let i = 0; i < SITES.length; i++) {
    const site = SITES[i];
    const qrDataUrl = getDataUrlFromContainer('qrcode-' + i);
    if (!qrDataUrl) continue;

    const finalImage = await createFormattedQRImage(qrDataUrl, site);

    zip.file(
      site.name.replace(/[^a-z0-9-_]/gi,'_') + ".png",
      finalImage.split(',')[1],
      { base64:true }
    );
    added++;
  }

  if (!added) return alert("No QR images found");

  const blob = await zip.generateAsync({ type:'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'Formatted_QR_Codes.zip';
  a.click();
}

async function printAllQRCodes() {
  const w = window.open('', '_blank');
  w.document.write('<html><body style="font-family:Arial;text-align:center;">');

  for (let i = 0; i < SITES.length; i++) {
    const site = SITES[i];
    const qrDataUrl = getDataUrlFromContainer('qrcode-' + i);
    if (!qrDataUrl) continue;

    const finalImage = await createFormattedQRImage(qrDataUrl, site);

    w.document.write(`
      <div style="page-break-after:always;">
        <img src="${finalImage}" width="600">
      </div>
    `);
  }

  w.document.write('</body></html>');
  w.document.close();
  setTimeout(() => w.print(), 800);
}

window.onload = () => {
  const cards = document.getElementById('cards');

  SITES.forEach((site, i) => {
    const id = 'qrcode-' + i;
    const fullUrl = BASE_URL + site.hash + "#siteKey=" + site.siteId;

    const card = document.createElement('div');
    card.style = 'width:320px;padding:12px;border:1px solid #eee;border-radius:8px;background:#fff;text-align:center;';
    card.innerHTML = `

      <div style="margin-top:8px;font-weight:600;color:#333;">${site.name}</div>
      <div style="display:flex;gap:8px;justify-content:center;margin-top:8px;">
        <button onclick="downloadContainerImage('${id}', SITES[${i}])">Download PNG</button>
      </div>
    `;
    cards.appendChild(card);

    generateQRCodeInto(id, fullUrl);
  });
};
