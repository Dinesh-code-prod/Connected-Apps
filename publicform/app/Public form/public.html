<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Service Request – Public</title>

<link href="https://fonts.googleapis.com/css?family=Roboto:400,500,600&display=swap" rel="stylesheet">

<style>
/* =====================
   GLOBAL
===================== */
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: linear-gradient(180deg, #eef3f9 0%, #fafafa 60%);
  font-family: Roboto, sans-serif;
  color: #283648;
}

.main-bg {
  height: 220px;
  background: linear-gradient(135deg, #0059D6, #2E7BFF);
}

/* =====================
   FORM CONTAINER
===================== */
.form-container {
  margin: -140px auto 32px;
  width: 760px;
  max-width: calc(100% - 24px);
}

/* =====================
   FORM SECTIONS
===================== */
.form-section {
  background: #fff;
  border-radius: 14px;
  padding: 24px;
  margin-bottom: 18px;
  border: 1px solid #EAEAEA;
  box-shadow: 0 12px 28px rgba(0,0,0,.08);
}

.form-header {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 18px;
  text-transform: uppercase;
  letter-spacing: .6px;
  color: #0059D6;
}

/* =====================
   FORM LAYOUT
===================== */
.form-row {
  display: flex;
  gap: 16px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.form-col {
  flex: 1;
  min-width: 220px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

/* =====================
   INPUTS
===================== */
.input-label {
  font-size: 12px;
  font-weight: 500;
  color: #5b6b82;
}

.input-field,
.select-field,
.textarea-field {
  border: 1px solid #DADFE6;
  border-radius: 6px;
  padding: 10px 12px;
  font-size: 14px;
  transition: all .2s ease;
  background: #fff;
}

.input-field:focus,
.select-field:focus,
.textarea-field:focus {
  outline: none;
  border-color: #0059D6;
  box-shadow: 0 0 0 2px rgba(0,89,214,.12);
}

.textarea-field {
  min-height: 80px;
  resize: vertical;
}

/* =====================
   FILE UPLOAD
===================== */
.file-upload {
  border: 2px dashed #C9D6EA;
  border-radius: 10px;
  padding: 18px;
  text-align: center;
  background: #F7FAFF;
}

.upload-label {
  font-size: 14px;
  font-weight: 500;
}

.upload-or {
  font-size: 12px;
  margin: 6px 0;
  color: #8a9bb5;
}

.upload-btn {
  padding: 8px 16px;
  border-radius: 6px;
  border: 1px solid #0059D6;
  background: #fff;
  color: #0059D6;
  cursor: pointer;
  font-size: 13px;
}

.upload-btn:hover {
  background: #0059D6;
  color: #fff;
}

/* =====================
   FOOTER BUTTON
===================== */
.footer {
  display: flex;
  justify-content: flex-end;
}
.space-dropdown-wrapper {
  position: relative;
  width: 100%;
}

.space-dropdown-wrapper .input-field {
  width: 100%;
}
.form-col {
  min-width: 220px;
}
.btn {
  padding: 10px 28px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
}

.btn-primary {
  background: linear-gradient(135deg, #0059D6, #2E7BFF);
  color: #fff;
}

.btn-primary:hover {
  opacity: .9;
}

.btn:disabled {
  opacity: .6;
  cursor: not-allowed;
}

/* =====================
   SUCCESS CARD
===================== */
.success-card {
  background: linear-gradient(135deg, #E6FFED, #F0FFF4);
  border: 1px solid #B7EAC3;
  border-radius: 14px;
  padding: 28px;
  text-align: center;
  color: #1B5E20;
  box-shadow: 0 10px 24px rgba(0,0,0,.08);
}

.success-icon {
  font-size: 44px;
  margin-bottom: 10px;
}

/* =====================
   RESPONSIVE
===================== */
@media (max-width: 768px) {
  .main-bg {
    height: 180px;
  }

  .form-container {
    margin-top: -120px;
  }

  .footer {
    justify-content: center;
  }

  .btn {
    width: 100%;
  }
}
.uploaded-file {
  margin-top: 8px;
  font-size: 12px;
  color: #607796;
  display: flex;
  align-items: center;
  gap: 8px;
}

.remove-file-btn {
  background: none;
  border: none;
  color: #ff4d4f;
  font-size: 14px;
  cursor: pointer;
  font-weight: bold;
}

.remove-file-btn:hover {
  color: #d9363e;
}
[v-cloak] {
  display: none !important;
}
.space-dropdown-wrapper {
  position: relative;
}

.space-dropdown {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  background: #fff;
  border: 1px solid #DADFE6;
  border-radius: 6px;
  max-height: 220px;
  overflow-y: auto;
  z-index: 20;
  box-shadow: 0 8px 18px rgba(0,0,0,.08);
  margin-top: 4px;
  padding: 0;
  list-style: none;
}

.space-dropdown li {
  padding: 10px 12px;
  font-size: 14px;
  cursor: pointer;
}

.space-dropdown li:hover {
  background: #F1F6FF;
}
@supports (-webkit-touch-callout: none) {
  input[type="datetime-local"] {
    height: 44px;
    font-size: 14px;
  }
}
</style>
</head>

<div id="app" v-cloak>
  <div class="main-bg"></div>

  <div class="form-container">

    <!-- SUCCESS -->
    <div v-if="formSubmitted" class="success-card">
      <div class="success-icon">✅</div>
      <h3>Service Request Submitted</h3>
      <p>Your request has been successfully created.<br>
      Our team will get back to you shortly.</p>
    </div>

    <div v-if="!formSubmitted">

      <!-- BASIC DETAILS -->
      <div class="form-section">
        <div class="form-header">Basic Details</div>

        <div class="form-row">
          <div class="form-col">
            <label class="input-label">Subject *</label>
            <input class="input-field" v-model="form.subject">
          </div>
        </div>

        <div class="form-row">
          <div class="form-col">
            <label class="input-label">Description</label>
            <textarea class="textarea-field" v-model="form.description"></textarea>
          </div>
        </div>

        <div class="form-row">
          <div class="form-col">
            <label class="input-label">Service Request Type *</label>
            <select class="select-field" v-model="serviceRequestType">
              <option value="">Select</option>
              <option value="Maintenance">Maintenance</option>
              <option value="Service">Service</option>
            </select>
          </div>

          <div class="form-col">
            <label class="input-label">Residence *</label>
            <select class="select-field" v-model="form.residenceType">
              <option value="">Select</option>
              <option value="Tenant">Tenant</option>
              <option value="Owner">Owner</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-col">
            <label class="input-label">Preferred Date & Time *</label>
            <input type="datetime-local" class="input-field" v-model="form.preferredDateTime" @keydown.prevent >
          </div>
        </div>
      </div>

      <!-- LOCATION -->
      <div class="form-section">
        <div class="form-header">Location</div>

        <div class="form-row">
          <div class="form-col">
            <label class="input-label">Site *</label>
            <select class="select-field" v-model="selectedSite" @change="onSiteChange">
              <option value="">Select Site</option>
              <option v-for="s in sites" :key="s.id" :value="s">{{ s.name }}</option>
            </select>
          </div>

          <div class="form-col">
            <label class="input-label">Building *</label>
            <select class="select-field" v-model="selectedBuilding" @change="onBuildingChange" :disabled="!buildings.length">
              <option value="">Select Building</option>
              <option v-for="b in buildings" :key="b.id" :value="b">{{ b.name }}</option>
            </select>
          </div>

         <div class="form-col">
  <label class="input-label">Space</label>
    <div class="space-dropdown-wrapper">
  <input
    class="input-field"
    v-model="spaceInput"
    placeholder="Search & select space"
    @input="onSpaceInput"
    @focus="showSpaceDropdown = true"
    @blur="hideSpaceDropdown"
    :readonly="!!selectedSpace"
  />

  <ul
    v-if="showSpaceDropdown && spaces.length"
    class="space-dropdown"
  >
    <li
      v-for="sp in spaces"
      :key="sp.id"
      @mousedown.prevent="selectSpace(sp)"
    >
      {{ sp.name }}
    </li>
  </ul>
</div>
</div>


        </div>
      </div>

      <!-- ISSUE -->
      <!-- ISSUE -->
<div class="form-section">
  <div class="form-header">Issue Details</div>

  <div class="form-row">

    <!-- CATEGORY -->
    <div class="form-col">
      <label class="input-label">Category</label>
      <select class="select-field" v-model="selectedCategoryId" :disabled="!serviceRequestType">
        <option value="">Select</option>
        <option
          v-for="c in categoryOptions"
          :key="c.id"
          :value="c.id"
        >
          {{ c.name }}
        </option>
      </select>
    </div>

    <!-- SUBCATEGORY -->
    <div class="form-col">
      <label class="input-label">Subcategory</label>
      <select class="select-field" v-model="selectedSubcategoryId" :disabled="!filteredSubcategories.length">
        <option value="">Select</option>
        <option
          v-for="s in filteredSubcategories"
          :key="s.id"
          :value="s.id"
        >
          {{ s.name }}
        </option>
      </select>
    </div>

    <!-- PROBLEM -->
    <div class="form-col">
      <label class="input-label">Problem</label>
      <select
        class="select-field"
        v-model="selectedProblemId"
        :disabled="!filteredProblems.length"
      >
        <option value="">Select</option>
        <option
          v-for="p in filteredProblems"
          :key="p.id"
          :value="p.id"
        >
          {{ p.name }}
        </option>
      </select>
    </div>

  </div>
</div>


      <!-- REQUESTER -->
      <div class="form-section">
        <div class="form-header">Requester Details</div>
          
          <div class="form-row">
          <div class="form-col">
            <label class="input-label">Name *</label>
            <input class="input-field" v-model="form.requestorName">
          </div>
          <div class="form-col">
            <label class="input-label">Email</label>
            <input class="input-field" v-model="form.email">
          </div>
        </div>
          

          <div class="form-row">
          <div class="form-col" style="max-width:120px">
            <label class="input-label">Country Code *</label>
            <select class="select-field" v-model="form.countryCode">
              <option value="+971">+971 (UAE)</option>
              <option value="+91">+91 (India)</option>
              <option value="+966">+966 (Saudi)</option>
              <option value="+974">+974 (Qatar)</option>
              <option value="+965">+965 (Kuwait)</option>
            </select>
          </div>

          <div class="form-col">
            <label class="input-label">Contact *</label>
            <input
              class="input-field"
              v-model="form.contactNumber"
              placeholder="Enter phone number"
              inputmode="numeric"
            />
          </div>
        </div>

          <div class="form-col">
            <label class="input-label">Attachment</label>

              <div class="upload-or">or</div>
              <input type="file" id="fileInput" style="display:none" @change="onFileChange" />
              <button class="upload-btn" @click.prevent="triggerFileInput">Browse File</button>

              <div v-if="form.attachments.length" style="margin-top:10px;font-size:12px">
                📎 {{ form.attachments[0].name }}
              </div>
              <div v-else style="margin-top:8px; font-size:12px; color:#ff6b6b;">
                No file selected
              </div>
            </div>
          </div>
        </div> -->
        <!-- </div> -->
        <div class="form-row">
            <div class="form-col">
            <label class="input-label">Attachment </label>
            <div class="file-upload">
            <div class="upload-label">Drag and Drop here</div>
            <div class="upload-or">or</div>
            <input type="file" id="fileInput" multiple style="display:none" accept=".jpg,.jpeg,.png,.pdf,.doc,.docx,.mov,.mp4" @change="onFileChange" />
            <button class="upload-btn" @click.prevent="triggerFileInput">Browse File</button>
            <div v-if="form.attachments.length" class="uploaded-file">
            <div v-for="(f, i) in form.attachments" :key="i">
              ✅ {{ f.name }}
              <button class="remove-file-btn" @click.prevent="removeSingleFile(i)">✕</button>
            </div>
          </div>

            <div v-else style="margin-top:8px; font-size:12px; color:#ff6b6b;">
                            No file selected
            </div>
            </div>
            </div>
            </div>
            </div>

      <div class="footer">
        <button class="btn btn-primary" :disabled="isSubmitting" @click="onSubmit">
          {{ isSubmitting ? 'Submitting...' : 'Submit Request' }}
        </button>
      </div>

    </div>
  </div>
</div>

parseLambdaListResponse(response) {
  // Unwrap SDK: response might be { data: body } or body directly
  let body = response;
  if (response && typeof response === 'object' && 'data' in response && response.data !== undefined) {
    body = response.data;
  }
  // Body might be stringified JSON from Lambda
  if (typeof body === 'string') {
    try {
      body = JSON.parse(body);
    } catch (e) {
      return [];
    }
  }
  // Lambda shape: { responseCode: 0, result: { apiResponse: "[...]" } }
  const result = body?.result;
  let raw = result?.apiResponse;
  if (typeof raw === 'string') {
    try {
      raw = JSON.parse(raw);
    } catch (e) {
      return [];
    }
  }
  if (Array.isArray(raw)) return raw;
  if (Array.isArray(body)) return body;
  if (Array.isArray(result)) return result;
  return [];

async onFileChange(e) {
  const files = Array.from(e.target.files);
  if (!files.length) return;

  for (const file of files) {
    const exists = this.form.attachments.some(f => f.name === file.name && f.size === file.size);
    if (exists) continue;

    const uploaded = await this.uploadSingleFile(file);
    if (uploaded) {
      this.form.attachments.push(file);
    } else {
      alert('File upload failed for "' + file.name + '". Please try again or use a smaller file.');

  }

  e.target.value = '';

async uploadSingleFile(file) {
  const res = await this.addFile(file);
  if (!res || res.error) {
    console.error('Upload failed:', res && res.error ? res.error.message : 'No response');
    return false;
  }
  const data = res.data;
  if (!data || data.fileId == null) {
    console.error('Upload response missing fileId:', res);
    return false;
  }
  this.serviceRequestAttachments.push({
    fileId: data.fileId,
    createdTime: data.createdTime
  });
  return true;

      async addFile(file) {
        console.log("file1",file);
        const MAX_SIZE = 10 * 1024 * 1024; // 10 MB
        if (file.size > MAX_SIZE) {
          return { error: { message: "File size exceeds 10 MB"} };
        }
        const base64Data = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => {
            const base64 = reader.result.split(',')[1];
            resolve(base64);
          };
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });

        const params = {
          name: file.name,
          type: file.type,
          size: file.size,
          encoding: 'base64',
          data: base64Data
        };
        const res = await window.facilioApp.interface.trigger("publicAddFile", params)
        console.log("result",res);
        return res;

console.log('Attachments:', this.serviceRequestAttachments);
