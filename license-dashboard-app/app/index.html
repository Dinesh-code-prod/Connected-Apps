<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CAFM License Manager</title>
    <link rel="stylesheet" href="/styles/app.css">
    <script type="text/javascript" src="https://static.facilio.com/apps-sdk/latest/facilio_apps_sdk.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/vue@2.7.14"></script>
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <script src="https://unpkg.com/element-ui/lib/index.js"></script>
    <script src="//unpkg.com/element-ui/lib/umd/locale/en.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root{--primary:#1257a8;--ink:#1b2430;--muted:#5b6472;--line:#e5e9f0;--bg:#f5f7fb;--card:#fff;--ok:#10b981;--warn:#f59e0b;--crit:#ef4444;--ok-s:#e6f7f0;--warn-s:#fdf2e0;--crit-s:#fdeaea;--pri-s:#e6effa;--pend:#f59e0b;--pend-s:#fdf2e0;}
        *{box-sizing:border-box;}
        body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;}
        .wrap{max-width:1240px;margin:0 auto;padding:22px;}
        .head{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;}
        .brand{font-size:16px;font-weight:800;color:var(--primary);}
        .h1{font-size:24px;font-weight:800;margin:14px 0 2px;letter-spacing:-.01em;}
        .sub{color:var(--muted);font-size:13px;}
        .updated{color:var(--muted);font-size:12px;}
        .filters{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;margin-top:16px;display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap;}
        .fitem{display:flex;flex-direction:column;gap:5px;}
        .flabel{font-size:12px;color:var(--muted);font-weight:600;}
        .grid{display:grid;gap:14px;margin-top:16px;}
        .grid6{grid-template-columns:repeat(6,1fr);}
        .grid4{grid-template-columns:repeat(4,1fr);}
        @media(max-width:1080px){.grid6{grid-template-columns:repeat(3,1fr);}.grid4{grid-template-columns:repeat(2,1fr);}}
        @media(max-width:640px){.grid6,.grid4{grid-template-columns:repeat(2,1fr);}}
        @media(max-width:440px){.grid6,.grid4{grid-template-columns:1fr;}}
        .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px;display:flex;flex-direction:column;gap:9px;transition:transform .12s ease,box-shadow .12s ease,border-color .12s ease;}
        .card.clickable{cursor:pointer;}
        .card.clickable:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(18,87,168,.10);border-color:#c9d8ee;}
        .card.sel{border-color:var(--primary);box-shadow:0 0 0 2px var(--pri-s);}
        .lic-card{min-height:138px;}
        .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
        .card-name{font-size:12.5px;font-weight:700;color:var(--muted);line-height:1.3;}
        .badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap;}
        .badge-ok{color:var(--ok);background:var(--ok-s);}
        .badge-warn{color:var(--warn);background:var(--warn-s);}
        .badge-crit{color:var(--crit);background:var(--crit-s);}
        .badge-info{color:var(--primary);background:var(--pri-s);}
        .count{font-size:25px;font-weight:800;line-height:1;}
        .count small{font-size:12.5px;font-weight:600;color:var(--muted);}
        .track{height:6px;border-radius:999px;background:#eef1f6;overflow:hidden;}
        .track>span{display:block;height:100%;border-radius:999px;background:var(--primary);transition:width .5s ease;}
        .fill-ok{background:var(--primary)!important;}.fill-warn{background:var(--warn)!important;}.fill-crit{background:var(--crit)!important;}
        .foot{font-size:12px;color:var(--muted);}
        .foot.crit{color:var(--crit);font-weight:700;}
        .metaline{font-size:11.5px;color:var(--muted);display:flex;justify-content:space-between;}
        .ring-card{align-items:center;text-align:center;}
        .ring-title{font-size:12.5px;font-weight:700;color:var(--muted);align-self:flex-start;}
        .ring-wrap{position:relative;width:110px;height:110px;margin:4px auto;}
        .ring-wrap svg{transform:rotate(-90deg);}
        .ring-val{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:18px;font-weight:800;}
        .ring-leg{display:flex;gap:14px;font-size:11.5px;color:var(--muted);}
        .dotL{display:inline-block;width:8px;height:8px;border-radius:999px;margin-right:5px;vertical-align:middle;}
        .panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px;margin-top:16px;}
        .panel-head{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px;}
        .panel-title{font-size:16px;font-weight:800;}
        .panel-sub{font-size:12px;color:var(--muted);margin-top:2px;}
        .tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;background:var(--pri-s);color:var(--primary);}
        .rolechip{font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;background:#eef2f7;color:#475569;}
        .dot{display:inline-block;width:8px;height:8px;border-radius:999px;margin-right:6px;vertical-align:middle;}
        .dot.g{background:var(--ok);}.dot.x{background:#c2c8d2;}.dot.p{background:var(--pend);}
        .stcell{font-weight:600;}
        .stcell.active{color:var(--ok);}.stcell.inactive{color:var(--muted);}
        .loading,.errbox,.empty{text-align:center;color:var(--muted);padding:44px;}
        .errbox{color:var(--crit);}
        .empty-ic{font-size:34px;color:#c2c8d2;margin-bottom:8px;}
        .skel{background:linear-gradient(90deg,#eef1f6 25%,#f6f8fc 37%,#eef1f6 63%);background-size:400% 100%;animation:sh 1.3s ease infinite;border-radius:8px;}
        @keyframes sh{0%{background-position:100% 50%}100%{background-position:0 50%}}
        .skel-card{height:138px;}
    </style>
</head>
<body>
<div id="app" class="wrap">
    <div class="head">
        <div class="brand">CAFM License Manager</div>
        <div class="updated" v-if="lastUpdated">Last update: {{ lastUpdated }}</div>
    </div>
    <div class="h1">License Utilization &amp; User Management</div>
    <div class="sub">Contract license monitoring · portal usage · verification status</div>

    <div class="filters">
        <div class="fitem" style="min-width:170px;">
            <span class="flabel">Type</span>
            <el-select v-model="bucketFilter" placeholder="All types" clearable size="small">
                <el-option v-for="b in bucketOptions" :key="b" :label="b" :value="b"></el-option>
            </el-select>
        </div>
        <div class="fitem" style="min-width:150px;">
            <span class="flabel">Status</span>
            <el-select v-model="statusFilter" placeholder="Any status" clearable size="small">
                <el-option label="Active" value="active"></el-option>
                <el-option label="Inactive" value="inactive"></el-option>
            </el-select>
        </div>
        <div class="fitem" style="flex:1;min-width:220px;">
            <span class="flabel">Search</span>
            <el-input v-model="search" placeholder="Search name, email, type or role" size="small" clearable prefix-icon="el-icon-search"></el-input>
        </div>
        <el-button size="small" icon="el-icon-close" @click="clearFilters" :disabled="!hasFilters">Clear Filters</el-button>
        <el-button type="primary" size="small" icon="el-icon-refresh" :loading="loading" @click="loadStats">Refresh</el-button>
        <el-button size="small" icon="el-icon-download" @click="exportPDF">Export PDF</el-button>
    </div>

    <div v-if="loading" class="grid grid6">
        <div class="skel skel-card" v-for="n in 6" :key="n"></div>
    </div>
    <div v-else-if="loadError" class="errbox">{{ loadError }}</div>

    <template v-else-if="loaded">
    <div id="capture">
        <div class="grid grid6">
            <div class="card lic-card clickable" v-for="c in cards" :key="c.key" :class="{sel: bucketFilter===c.bucket}" @click="c.bucket ? toggleBucket(c.bucket) : null">
                <div class="card-top">
                    <div class="card-name">{{ c.label }}</div>
                    <div class="badge" :class="c.info ? 'badge-info' : badgeClass(c.pct)">{{ c.info ? 'info' : c.pct + '% used' }}</div>
                </div>
                <div class="count">{{ c.added }}<small v-if="!c.info"> / {{ c.contract }}</small><small v-else> total</small></div>
                <div v-if="!c.info" class="track"><span :class="fillClass(c.pct)" :style="{width: Math.min(100,c.pct)+'%'}"></span></div>
                <div class="metaline"><span>Active: {{ c.active }}</span><span v-if="!c.info" :class="{crit:(c.contract-c.added)<=0}">{{ (c.contract-c.added)>0 ? (c.contract-c.added)+' left' : 'Limit reached' }}</span></div>
            </div>
        </div>

        <div class="grid grid4">
            <div class="card ring-card" v-for="r in rings" :key="r.key">
                <div class="ring-title">{{ r.title }}</div>
                <div class="ring-wrap">
                    <svg width="110" height="110" viewBox="0 0 110 110">
                        <circle cx="55" cy="55" r="47" fill="none" stroke="#eef1f6" stroke-width="11"></circle>
                        <circle cx="55" cy="55" r="47" fill="none" :stroke="r.color" stroke-width="11" stroke-linecap="round"
                            :stroke-dasharray="circ" :stroke-dashoffset="circ - (circ * Math.min(100,r.pct) / 100)"></circle>
                    </svg>
                    <div class="ring-val">{{ r.pct }}%</div>
                </div>
                <div class="ring-leg">
                    <span><span class="dotL" :style="{background:r.color}"></span>{{ r.legend }}</span>
                    <span><span class="dotL" style="background:#e0e4ea;"></span>Free</span>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-head">
                <div>
                    <div class="panel-title">User Directory</div>
                    <div class="panel-sub">{{ filteredUsers.length }} of {{ users.length }} users{{ activeFilterLabel }}</div>
                </div>
            </div>
            <div v-if="!filteredUsers.length" class="empty">
                <div class="empty-ic">🔍</div>
                <div>No users match your filters.</div>
                <el-button type="text" @click="clearFilters">Clear filters</el-button>
            </div>
            <template v-else>
            <el-table :data="pagedUsers" style="width:100%" size="small" stripe :default-sort="{prop:'bucket',order:'ascending'}">
                <el-table-column prop="name" label="User" sortable min-width="170"></el-table-column>
                <el-table-column prop="email" label="Email" min-width="210"></el-table-column>
                <el-table-column prop="bucket" label="Type" sortable width="130">
                    <template slot-scope="s"><span class="tag">{{ s.row.bucket }}</span></template>
                </el-table-column>
                <el-table-column prop="role" label="Role" width="160">
                    <template slot-scope="s"><span v-if="s.row.role" class="rolechip">{{ s.row.role }}</span><span v-else style="color:#c2c8d2;">—</span></template>
                </el-table-column>
                <el-table-column label="Status" width="120" sortable prop="active">
                    <template slot-scope="s"><span class="stcell" :class="s.row.active?'active':'inactive'"><span class="dot" :class="s.row.active?'g':'x'"></span>{{ s.row.active?'Active':'Inactive' }}</span></template>
                </el-table-column>
            </el-table>
            <div style="display:flex;justify-content:flex-end;margin-top:12px;">
                <el-pagination layout="prev, pager, next" :total="filteredUsers.length" :page-size="pageSize" :current-page.sync="currentPage"></el-pagination>
            </div>
            </template>
        </div>
    </div>
    </template>

    <script type="text/javascript">
        ELEMENT.locale(ELEMENT.lang.en);
        const CONTRACT_LIMITS = { Admin:1, Maintenance:25, Vendor:100, Tenant:500 };
        const LICENSE_STATS_SCRIPT = "Map computeLicenseStats() {\r\n    result = {};\r\n    roleNameMap = {};\r\n    roleNameMap.put(\"531\", \"CAFM Super Administrator\");\r\n    roleNameMap.put(\"532\", \"CAFM Administrator\");\r\n    roleNameMap.put(\"614\", \"Cafm Operator\");\r\n    roleNameMap.put(\"615\", \"Technician\");\r\n    roleNameMap.put(\"616\", \"Store Keeper\");\r\n    roleNameMap.put(\"617\", \"Supervisor\");\r\n    roleNameMap.put(\"715\", \"IT Administrator\");\r\n    personRoleMap = {};\r\n    adminRoleIds = [531, 532];\r\n    adminPeople = Module(\"people\").getPeopleForRoles(adminRoleIds);\r\n    adminCount = 0;\r\n    if (adminPeople != null) {\r\n        adminCount = adminPeople.size();\r\n        for each ai, ap in adminPeople {\r\n            personRoleMap.put(ap.id + \"\", \"Admin\");\r\n        }\r\n    }\r\n    maintRoleIds = [614, 615, 616, 617, 715];\r\n    maintRolePeople = Module(\"people\").getPeopleForRoles(maintRoleIds);\r\n    if (maintRolePeople != null) {\r\n        for each mi, mp in maintRolePeople {\r\n            rid = mp.roleId + \"\";\r\n            rn = roleNameMap.get(rid);\r\n            if (rn == null) {\r\n                rn = \"Maintenance\";\r\n            }\r\n            personRoleMap.put(mp.id + \"\", rn);\r\n        }\r\n    }\r\n    admin = 0;\r\n    maintenance = 0;\r\n    vendor = 0;\r\n    tenant = 0;\r\n    requester = 0;\r\n    other = 0;\r\n    activeCount = 0;\r\n    userList = [];\r\n    peopleFetch = {};\r\n    peopleFetch.put(\"criteria\", [id > 0]);\r\n    peopleFetch.put(\"limit\", 5000);\r\n    allPeople = Module(\"people\").fetch(peopleFetch);\r\n    if (allPeople != null) {\r\n        for each index, p in allPeople {\r\n            pid = p.id + \"\";\r\n            roleLabel = personRoleMap.get(pid);\r\n            bucket = \"Other\";\r\n            if (roleLabel == \"Admin\") {\r\n                bucket = \"Admin\";\r\n                admin = admin + 1;\r\n            } else if (p.peopleType == 3) {\r\n                bucket = \"Maintenance\";\r\n                maintenance = maintenance + 1;\r\n            } else if (p.peopleType == 2) {\r\n                bucket = \"Vendor\";\r\n                vendor = vendor + 1;\r\n            } else if (p.peopleType == 1) {\r\n                bucket = \"Tenant\";\r\n                tenant = tenant + 1;\r\n            } else if (p.peopleType == 7) {\r\n                bucket = \"Requester\";\r\n                requester = requester + 1;\r\n            } else {\r\n                other = other + 1;\r\n            }\r\n            isActive = false;\r\n            if (p.active == true) {\r\n                isActive = true;\r\n                activeCount = activeCount + 1;\r\n            }\r\n            roleDisplay = \"\";\r\n            if (roleLabel != null) {\r\n                roleDisplay = roleLabel;\r\n            }\r\n            row = {};\r\n            row.name = p.name;\r\n            row.email = p.email;\r\n            row.peopleType = p.peopleType;\r\n            row.bucket = bucket;\r\n            row.role = roleDisplay;\r\n            row.active = isActive;\r\n            userList.add(row);\r\n        }\r\n    }\r\n    tenantEntityCount = 0;\r\n    tenantFetch = {};\r\n    tenantFetch.put(\"criteria\", [id > 0]);\r\n    tenantFetch.put(\"limit\", 5000);\r\n    tenantEntities = Module(\"tenant\").fetch(tenantFetch);\r\n    if (tenantEntities != null) {\r\n        tenantEntityCount = tenantEntities.size();\r\n    }\r\n    vendorEntityCount = 0;\r\n    vendorFetch = {};\r\n    vendorFetch.put(\"criteria\", [id > 0]);\r\n    vendorFetch.put(\"limit\", 5000);\r\n    vendorEntities = Module(\"vendors\").fetch(vendorFetch);\r\n    if (vendorEntities != null) {\r\n        vendorEntityCount = vendorEntities.size();\r\n    }\r\n    result.admin = admin;\r\n    result.maintenance = maintenance;\r\n    result.vendor = vendor;\r\n    result.tenant = tenant;\r\n    result.requester = requester;\r\n    result.other = other;\r\n    result.activeCount = activeCount;\r\n    result.tenantEntityCount = tenantEntityCount;\r\n    result.vendorEntityCount = vendorEntityCount;\r\n    result.users = userList;\r\n    return result;\r\n}\r\n";
        var app = new Vue({
            el:'#app',
            data:{ loading:false, loaded:false, loadError:null, lastUpdated:null, stats:null, users:[], search:'', bucketFilter:'', statusFilter:'', currentPage:1, pageSize:10, circ:2*Math.PI*47 },
            computed:{
                hasFilters(){ return !!(this.bucketFilter||this.statusFilter||this.search); },
                activeFilterLabel(){
                    let p=[];
                    if(this.bucketFilter) p.push(this.bucketFilter);
                    if(this.statusFilter) p.push(this.statusFilter==='active'?'Active':'Inactive');
                    return p.length? ' · '+p.join(' · '):'';
                },
                cards(){
                    if(!this.stats) return [];
                    const s=this.stats;
                    const activeIn=b=>this.users.filter(u=>u.bucket===b&&u.active).length;
                    const defs=[
                        {key:'admin',label:'CAFM Admin',bucket:'Admin',added:s.admin,contract:CONTRACT_LIMITS.Admin,active:activeIn('Admin')},
                        {key:'maint',label:'Maintenance Users',bucket:'Maintenance',added:s.maintenance,contract:CONTRACT_LIMITS.Maintenance,active:activeIn('Maintenance')},
                        {key:'vendor',label:'Vendor Contacts',bucket:'Vendor',added:s.vendor,contract:CONTRACT_LIMITS.Vendor,active:activeIn('Vendor')},
                        {key:'tenantc',label:'Tenant Contacts',bucket:'Tenant',added:s.tenant,contract:CONTRACT_LIMITS.Tenant,active:activeIn('Tenant')},
                        {key:'tenants',label:'Tenants (entities)',bucket:'',added:s.tenantEntityCount,contract:0,active:0,info:true},
                        {key:'vendors',label:'Vendors (entities)',bucket:'',added:s.vendorEntityCount,contract:0,active:0,info:true},
                    ];
                    return defs.map(d=>({...d,pct:d.contract?Math.round((d.added/d.contract)*100):0}));
                },
                rings(){
                    if(!this.stats) return [];
                    const c=this.cards; const f=k=>c.find(x=>x.key===k)||{pct:0};
                    return [
                        {key:'m',title:'Maintenance Dist.',pct:f('maint').pct,color:'#1257a8',legend:'Used'},
                        {key:'v',title:'Vendor Dist.',pct:f('vendor').pct,color:'#b45309',legend:'Used'},
                        {key:'t',title:'Tenant Dist.',pct:f('tenantc').pct,color:'#10b981',legend:'Used'},
                        {key:'a',title:'Active Status',pct:this.users.length?Math.min(100,Math.round((this.stats.activeCount/this.users.length)*100)):0,color:'#475569',legend:'Active'},
                    ];
                },
                bucketOptions(){ return Array.from(new Set(this.users.map(u=>u.bucket))); },
                filteredUsers(){
                    let l=this.users;
                    if(this.bucketFilter) l=l.filter(u=>u.bucket===this.bucketFilter);
                    if(this.statusFilter) l=l.filter(u=> this.statusFilter==='active'?u.active:!u.active);
                    if(this.search){ const q=this.search.toLowerCase().trim(); l=l.filter(u=>((u.name||'').toLowerCase().includes(q))||((u.email||'').toLowerCase().includes(q))||((u.bucket||'').toLowerCase().includes(q))||((u.role||'').toLowerCase().includes(q))); }
                    return l;
                },
                pagedUsers(){ const s=(this.currentPage-1)*this.pageSize; return this.filteredUsers.slice(s,s+this.pageSize); }
            },
            mounted(){
                if(window.FacilioAppSDK){
                    window.facilioApp=FacilioAppSDK.init();
                    window.facilioApp.on("app.loaded",()=>{ this.loadStats(); });
                    setTimeout(()=>{ if(!this.loaded&&!this.loading) this.loadStats(); },2000);
                } else { this.loadError='Facilio SDK not available.'; }
            },
            methods:{
                async loadStats(){
                    this.loading=true; this.loadError=null;
                    try{
                        const { result } = await window.facilioApp.request.invokeFacilioAPI('/v2/workflow/runWorkflow',{
                            method:'POST', data:{ workflow:{ isV2Script:true, workflowV2String: LICENSE_STATS_SCRIPT }, paramList:[{}] }
                        });
                        const data = result && result.workflow ? result.workflow.returnValue : null;
                        if(!data){ throw new Error('No data returned from workflow.'); }
                        this.stats=data; this.users=data.users||[]; this.loaded=true;
                        this.lastUpdated=new Date().toLocaleTimeString();
                    }catch(err){ console.error(err); this.loadError='Could not load license data. '+(err&&err.message?err.message:''); }
                    finally{ this.loading=false; }
                },
                toggleBucket(b){ this.bucketFilter = this.bucketFilter===b ? '' : b; },
                clearFilters(){ this.bucketFilter=''; this.statusFilter=''; this.search=''; this.currentPage=1; },
                exportPDF(){
                    const el=document.getElementById('capture');
                    if(!el||!window.html2pdf) return;
                    window.html2pdf().set({margin:8,filename:'cafm-license-dashboard.pdf',image:{type:'jpeg',quality:.95},html2canvas:{scale:2,useCORS:true},jsPDF:{unit:'mm',format:'a4',orientation:'landscape'}}).from(el).save();
                },
                badgeClass(p){ return p>=100?'badge-crit':(p>=80?'badge-warn':'badge-ok'); },
                fillClass(p){ return p>=100?'fill-crit':(p>=80?'fill-warn':'fill-ok'); },
            },
            watch:{ search(){this.currentPage=1;}, bucketFilter(){this.currentPage=1;}, statusFilter(){this.currentPage=1;} }
        });
    </script>
</div>
</body>
</html>
